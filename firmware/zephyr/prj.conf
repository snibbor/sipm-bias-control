CONFIG_NEWLIB_LIBC=y
CONFIG_BUILD_OUTPUT_HEX=y

CONFIG_GPIO=y
CONFIG_I2C=y
CONFIG_DAC=y

CONFIG_LOG=y
CONFIG_LOG_PRINTK=n
CONFIG_LOG_CMDS=y
CONFIG_LOG_RUNTIME_FILTERING=y

CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_LINE_CTRL=y

CONFIG_SHELL=y
CONFIG_SHELL_PROMPT_UART=""
CONFIG_REBOOT=y
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_CDC_ACM=y
CONFIG_USB_DEVICE_MANUFACTURER="Applikate"
CONFIG_USB_DEVICE_PRODUCT="SiPM Bias Controller"
CONFIG_USB_DEVICE_INITIALIZE_AT_BOOT=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_SHELL_BACKEND_RTT=n

CONFIG_RTT_CONSOLE=n
CONFIG_USE_SEGGER_RTT=n

# Retention boot mode (reboot into DFU)
CONFIG_RETAINED_MEM=y
CONFIG_RETENTION=y
CONFIG_RETENTION_BOOT_MODE=y

# MCUboot app-side support
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_IMG_MANAGER=y
CONFIG_MCUBOOT_IMG_MANAGER=y
CONFIG_STREAM_FLASH=y

# Persistent calibration storage
CONFIG_NVS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y

# Boost converter variant (override in board defconfig or via menuconfig)
CONFIG_BIAS_LT8361=y

# Larger main stack for shell command handlers
CONFIG_MAIN_STACK_SIZE=2048
