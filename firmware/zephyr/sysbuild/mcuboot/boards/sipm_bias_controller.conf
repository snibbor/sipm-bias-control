# USB CDC-ACM serial recovery
CONFIG_MCUBOOT_SERIAL=y
CONFIG_BOOT_SERIAL_CDC_ACM=y
CONFIG_BOOT_SERIAL_ENTRANCE_GPIO=n
CONFIG_BOOT_SERIAL_NO_APPLICATION=y
CONFIG_BOOT_SERIAL_BOOT_MODE=y

# Retention subsystem for boot mode flag
CONFIG_RETAINED_MEM=y
CONFIG_RETENTION=y
CONFIG_RETENTION_BOOT_MODE=y

# MUST disable UART console when using CDC-ACM
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=n

CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_CDC_ACM=y
CONFIG_USB_DEVICE_MANUFACTURER="Applikate"
CONFIG_USB_DEVICE_PRODUCT="SiPM Bias Controller (DFU)"
CONFIG_USB_DEVICE_INITIALIZE_AT_BOOT=n

# Clock: internal OSC8M (no external crystal on the bias board)
CONFIG_SOC_ATMEL_SAMD_OSC8M=y
